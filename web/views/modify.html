                            +
                            <!-- <img src="./images/head.jpg" alt=""> -->

                        <p>上传照片(120*160px)</p>

                <input type="hidden" name="photo" id="photo" value="{{.Edu.Photo}}" />
                <button type="button" name="button" class="btn">修改电子证书信息</button>
            </form>
        </div>
        <!-- data-backdrop="false"去除遮罩层  -->
        <div class="modal fade bd-example-modal-sm" id="myModal" role="dialog" data-backdrop="false" aria-hidden="true">
            <div class="modal-dialog modal-sm">

<script type="text/javascript" src="/static/js/jquery.min.js"></script>
<script type="text/javascript" src="/static/js/bootstrap.min.js"></script>
<script type="text/javascript">
    $(function () {
        // 上传图片
        $('#file').unbind('change').bind('change', function () {
            event.stopPropagation();
            uploadFile('img');
            return;
        });
        // 头像图片
        var artImg;
        function uploadFile(type) {
            event.stopPropagation();
            let formData = new FormData();
            if (type == "img") {
                formData.append('file', $('#file')[0].files[0]);
            }
            $.ajax({
                url: '/upload',
                type: 'POST',
                cache: false,
                data: formData,
                processData: false,
                dataType: "json",
                contentType: false
            }).done(function (res) {
                if (res.error == "0") {
                    if (type == "img") {
                        $('.uploadImg img').attr('src', res.result.path);
                        $('#photo').val(res.result.path)
                        return artImg = res.result.path;
                    }
                } else {
                    alert("上传失败！" + res.result.msg)
                }
            }).fail(function (res) { });
        }

        var inputs = $('input[type="text"]');
        // 提交按钮
        $('.btn').click(function () {
            // 如果为空 报错提示
            for (var i = 0; i < inputs.length; i++) {
                if (!($(inputs[i]).val())) {
                    $(inputs[i]).addClass('redColor');
                    $('#myModal').modal('show');
                    setTimeout(function () {
                        $("#myModal").modal("hide");
                    }, 2000);
                    return;
                }
            }

            // 成功后提交数据
            $("form[name='modifyForm']").submit()
        })
    })
</script>
